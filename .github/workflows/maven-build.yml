# reusable/ecr-build-push.yml
#
# Reusable workflow: build one Spring Petclinic service, scan it with Trivy,
# and push the ARM64 image to ECR dev.
#
# Called by build-push.yml once per changed service.
# All AWS credentials come through OIDC using AWS_ROLE_ARN.

name: Build, Scan, Push (reusable)

on:
  workflow_call:
    inputs:
      service:
        description: "Service name matching ECR repo and helm-values filename"
        required: true
        type: string
      sha:
        description: "7-character commit SHA used as the Docker image tag"
        required: true
        type: string
      aws-region:
        description: "AWS region where ECR repositories are hosted"
        required: false
        type: string
        default: "eu-central-1"
      aws-account-id:
        description: "AWS account ID for constructing the ECR registry URL"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: ${{ inputs.service }}
    runs-on: ubuntu-latest

    env:
      MAVEN_MODULE: spring-petclinic-${{ inputs.service }}
      SOURCE_IMAGE: springcommunity/spring-petclinic-${{ inputs.service }}
      TARGET_IMAGE: ${{ inputs.aws-account-id }}.dkr.ecr.${{ inputs.aws-region }}.amazonaws.com/petclinic-dev-${{ inputs.service }}:${{ inputs.sha }}

    steps:
      - name: Checkout application repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Set up QEMU for ARM64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          region: ${{ inputs.aws-region }}

      - name: Build Docker image for ARM64 with Maven
        run: |
          ./mvnw clean install \
            -P buildDocker \
            -Dcontainer.platform="linux/arm64" \
            -pl "${{ env.MAVEN_MODULE }}" -am \
            --no-transfer-progress \
            --batch-mode

      - name: Trivy scan — CRITICAL
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.SOURCE_IMAGE }}
          format: table
          output: trivy-critical-${{ inputs.service }}.txt
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL
          trivyignores: .trivyignore

      - name: Trivy scan — HIGH informational
        if: always()
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.SOURCE_IMAGE }}
          format: table
          output: trivy-high-${{ inputs.service }}.txt
          exit-code: "0"
          ignore-unfixed: true
          severity: HIGH
          trivyignores: .trivyignore

      - name: Upload Trivy scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results-${{ inputs.service }}-${{ inputs.sha }}
          path: |
            trivy-critical-${{ inputs.service }}.txt
            trivy-high-${{ inputs.service }}.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Tag image with commit SHA
        run: |
          docker tag "${{ env.SOURCE_IMAGE }}" "${{ env.TARGET_IMAGE }}"
          echo "Tagged: ${{ env.SOURCE_IMAGE }} -> ${{ env.TARGET_IMAGE }}"

      - name: Push image to ECR
        run: |
          docker push "${{ env.TARGET_IMAGE }}"
          echo "Pushed: ${{ env.TARGET_IMAGE }}"

      - name: Logout from ECR
        if: always()
        run: |
          docker logout "${{ inputs.aws-account-id }}.dkr.ecr.${{ inputs.aws-region }}.amazonaws.com"
